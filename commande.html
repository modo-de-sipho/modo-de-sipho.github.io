<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commande | Sipho</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu">
        <h1>Commande</h1>
        <nav>
            <ul>
                <li><a href="index.html#projects">Mes projets</a></li>
                <li><a href="index.html#language">Langages maîtrisés</a></li>
                <li><a href="index.html#about">À propos</a></li>
                <li><a href="index.html#contact">Contact</a></li>
                <li><a href="index.html#commande">Passer commande</a></li>
            </ul>
        </nav>
    </div>
    <div class="content">
        <section>
            <h2>Page de commande</h2>
            <form id="commandeForm" action="#" method="post">
                <label for="type_projet">Type de projet</label>
                <select id="type_projet" name="type_projet" required>
                    <option value="">-- Choisissez --</option>
                    <option value="web">Web</option>
                    <option value="appli_python">Appli Python</option>
                    <option value="bot_discord">Bot Discord</option>
                </select>

                <div id="description-field" class="hidden">
                    <label for="description">Description du projet</label>
                    <textarea id="description" name="description" placeholder="Décrivez votre projet..." rows="4"></textarea>
                </div>

                <label for="budget">Budget</label>
                <input type="text" id="budget" name="budget" placeholder="Ex: 50€" required>

                <label for="contact_method">Comment vous contacter ?</label>
                <select id="contact_method" name="contact_method" required>
                    <option value="">-- Choisissez --</option>
                    <option value="telephone">Numéro de téléphone</option>
                    <option value="email">Adresse email</option>
                    <option value="discord">Discord</option>
                </select>

                <div class="contact-field contact-telephone hidden">
                    <label for="telephone">Numéro de téléphone</label>
                    <input type="tel" id="telephone" name="telephone" placeholder="+33 6 12 34 56 78">
                </div>

                <div class="contact-field contact-email hidden">
                    <label for="email">Adresse email</label>
                    <input type="email" id="email" name="email" placeholder="ton@email.com">
                </div>

                <div class="contact-field contact-discord hidden">
                    <label for="discord">Discord</label>
                    <input type="text" id="discord" name="discord" placeholder="Pseudo#1234">
                </div>

                <button class="btn-commande" type="submit">Envoyer la demande</button>
            </form>
            <a class="btn-commande" href="index.html#contact">Retour au portfolio</a>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
